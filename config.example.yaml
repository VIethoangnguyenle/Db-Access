databases:
  oracle_prod:
    type: oracle
    host: 127.0.0.1
    port: 1521
    service: XEPDB1
    user: ${PROD_USER}
    password: ${PROD_PASS}

  # Ví dụ DB qua SSH tunnel — tương đương:
  #   ssh -N -L <auto>:127.0.0.1:18789 ssh-user@xx.xxx.xx.xx
  # KHÔNG khai privateKey → server spawn `ssh` hệ thống, dùng ~/.ssh/config,
  # default key, ssh-agent sẵn có của máy (giống lệnh ssh bạn vẫn chạy tay).
  # oracle_via_ssh:
  #   type: oracle
  #   host: 127.0.0.1        # nhìn từ phía bastion (đầu xa của -L)
  #   port: 18789
  #   service: XEPDB1
  #   user: ${PROD_USER}
  #   password: ${PROD_PASS}
  #   ssh:
  #     host: xx.xxx.xx.xx
  #     user: ssh-user
  #     # port: 22
  #     # privateKey: ~/.ssh/id_rsa   # khai nếu muốn dùng ssh2 + key cụ thể

  # PostgreSQL — bắt buộc khai `database` (không dùng `service`).
  # pg_analytics:
  #   type: postgres
  #   host: 127.0.0.1
  #   port: 5432
  #   database: analytics
  #   user: ${PG_USER}
  #   password: ${PG_PASS}
  #   # ssh: { host: xx.xxx.xx.xx, user: ssh-user }   # tunnel giống Oracle

  # MongoDB — bắt buộc khai `database`.
  # mongo_logs:
  #   type: mongo
  #   host: 127.0.0.1
  #   port: 27017
  #   database: logs
  #   user: ${MONGO_USER}
  #   password: ${MONGO_PASS}
sources:
  agent_a:
    apiKey: ${KEY_A}
    # access: mỗi dự án chỉ khai những DB nó dùng. Hai dạng:
    #   - rút gọn:  <dbName>: [capabilities]
    #   - đầy đủ:   <dbName>: { capabilities: [...], description: "..." }
    # `description` được trả về trong list_databases để agent biết DB dùng làm gì.
    access:
      oracle_prod:
        capabilities: [read]
        description: "DB bán hàng: đơn hàng, khách hàng (chỉ đọc)"
      # mongo_logs: [read]   # dạng rút gọn vẫn dùng được

  # Triển khai 2 máy: Máy A chạy server + giữ tunnel; Máy B kết nối DB QUA Máy A.
  # Mỗi máy/agent một source + apiKey riêng để thu hồi/giới hạn quyền độc lập.
  # Xem README mục "Triển khai 2 máy".
  #
  # MỘT source có thể cấp NHIỀU DB (oracle + postgres + mongo) — Máy B chỉ mở 1
  # kết nối MCP là dùng được tất cả. Quyền siết theo từng DB độc lập:
  #   list_databases chỉ trả về 3 DB dưới đây; sql_write trên oracle_prod (chỉ
  #   read) bị từ chối, nhưng trên pg_analytics (read+write) thì được.
  # agent_b:               # agent từ Máy B (client từ xa) → http://<MÁY_A_IP>:3000/mcp
  #   apiKey: ${KEY_B}
  #   access:
  #     oracle_prod:  { capabilities: [read],        description: "DB prod (chỉ đọc) cho Máy B" }
  #     pg_analytics: { capabilities: [read, write], description: "DB phân tích" }
  #     mongo_logs:   [read]    # dạng rút gọn vẫn dùng được
